# Génère les icônes Android depuis les visuels de branding/.
# Lancer : dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  # Icône classique (carré émeraude à coins arrondis, R blanc).
  image_path: "branding/icon.png"
  # Adaptive icon (Android 8+) : fond émeraude plein + R centré en avant-plan.
  adaptive_icon_background: "#059669"
  adaptive_icon_foreground: "branding/icon_foreground.png"
  min_sdk_android: 21
